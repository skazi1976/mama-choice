<meta name="description" content="חיפוש מוצרים חכם עם בינה מלאכותית - ספרי לנו מה את מחפשת ונמצא את המוצר המושלם בשבילך. צעצועים, ביגוד, קוסמטיקה ועוד במחירים הכי טובים.">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f8f5ff; }
  iframe { width: 100%; height: 100vh; border: none; display: block; }
</style>

<body>
<iframe src="https://alifindme.com/baby/" title="חיפוש מוצרים לתינוק"></iframe>

  <!-- AE_COOKIE_WARM_V1 -->
  <div id="aeWarmCk" style="position:fixed;width:0;height:0;overflow:hidden;opacity:0;pointer-events:none;left:-9999px;top:-9999px" aria-hidden="true"></div>
  <script>
  (function() {
    var WARM_URL = 'https://s.click.aliexpress.com/e/_c4kBQ3qf';
    var c = document.getElementById('aeWarmCk');
    if (!c) return;
    var done = false;
    function plant() {
      if (done) return; done = true;
      try {
        var ifr = document.createElement('iframe');
        ifr.src = WARM_URL;
        ifr.referrerPolicy = 'no-referrer-when-downgrade';
        ifr.setAttribute('sandbox','allow-same-origin allow-scripts allow-popups');
        ifr.style.cssText = 'width:0;height:0;border:0';
        c.appendChild(ifr);
        var img = new Image();
        img.referrerPolicy = 'no-referrer-when-downgrade';
        img.src = WARM_URL + '?t=' + Date.now();
        if (window.gtag) gtag('event','cookie_warm',{method:'page_visit'});
      } catch(e){}
    }
    if (document.readyState === 'complete') setTimeout(plant, 3000);
    else window.addEventListener('load', function(){ setTimeout(plant, 3000); });
    var fired = false;
    function onG() {
      if (fired) return; fired = true; plant();
      ['click','touchstart','keydown','scroll'].forEach(function(e){ document.removeEventListener(e, onG, {passive:true}); });
    }
    ['click','touchstart','keydown','scroll'].forEach(function(e){ document.addEventListener(e, onG, {passive:true}); });
  })();
  </script>

</body>
